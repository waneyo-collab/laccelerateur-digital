          contenu: '<p>L\'agilité repose sur un cycle permanent : concevoir, mesurer les résultats, apprendre de ses erreurs, puis recommencer l\'optimisation.</p><p>Écoutez vos premiers utilisateurs avec humilité. S\'ils bloquent sur une étape de votre parcours ou s\'ils n\'utilisent pas une option, modifiez votre trajectoire rapidement. C\'est cette flexibilité qui permet aux petites structures de dépasser les grandes entreprises rigides.</p>',
          image_url: null
        },
        {
          module_nom: 'Phase 1 - Module 10 : Introduction à la méthode Agile',
          titre: 'Examen de fin de module',
          contenu: '<p>Validons vos compétences sur les principes de la gestion de projet agile et itérative.</p>',
          quiz_multi: [
            {
              question: "1. Quel est l'objectif principal de la création d'un produit minimum viable (MVP) ?",
              options: ["Dépenser tout son budget dès le premier jour", "Lancer une version simple pour tester rapidement le marché et l'améliorer grâce aux retours clients", "Attendre deux ans avant de montrer son projet au public"],
              correctIndex: 1,
              feedback: "Félicitations ! Tester rapidement permet d'ajuster son offre sans gaspiller de ressources précieuses."
            }
          ],
          image_url: null
        }
      ]
  // MOTEUR LOGIQUE DU LECTEUR UNIQUE
  let slides = [];
  let currentIndex = 0;
  let currentQuizQuestionIndex = 0;
  let userScore = 0;

  function initLecteur() {
    const urlParams = new URLSearchParams(window.location.search);
    const phase = urlParams.get('phase') || '1';
    const module = urlParams.get('module') || '1';
    
    const phaseKey = 'phase' + phase;
    const moduleKey = 'module' + module;

    if (database[phaseKey] && database[phaseKey][moduleKey]) {
      slides = database[phaseKey][moduleKey];
    } else {
      // Fallback par défaut si le module n'est pas encore écrit
      slides = database.phase1.module1; 
    }
    displaySlide();
  }

  function displaySlide() {
    if (slides.length === 0) return;
    const current = slides[currentIndex];
    
    document.getElementById('module-title').innerText = current.module_nom;
    document.getElementById('slide-title').innerText = current.titre;
    document.getElementById('slide-content').innerHTML = current.contenu || '';

    const mediaContainer = document.getElementById('slide-media');
    mediaContainer.innerHTML = ''; 

    if (current.quiz_multi) {
      if (currentQuizQuestionIndex === 0) userScore = 0;
      displayQuizQuestion();
    } else {
      currentQuizQuestionIndex = 0;
      document.getElementById('btn-next').disabled = (currentIndex === slides.length - 1);
    }

    document.getElementById('btn-prev').disabled = (currentIndex === 0);
    document.getElementById('progress').innerText = `Slide ${currentIndex + 1} / ${slides.length}`;
  }

  function displayQuizQuestion() {
    const current = slides[currentIndex];
    const qCount = current.quiz_multi.length;
    
    if (currentQuizQuestionIndex >= qCount) {
      let resultHTML = `<div class="quiz-box" style="text-align:center;">`;
      resultHTML += `<h3 style="color:#7C3AED; margin-bottom:10px;">Évaluation Terminée</h3>`;
      resultHTML += `<p style="font-size:1.2rem; margin-bottom:15px;">Votre score validé : <strong>${userScore} / ${qCount}</strong></p>`;
      if (userScore >= 4) {
        resultHTML += `<p style="color:#10B981; font-weight:600;">Félicitations, les notions clés sont parfaitement acquises ! Vous pouvez cliquer sur "Suivant" pour conclure.</p>`;
      } else {
        resultHTML += `<p style="color:#F59E0B; font-weight:600;">Score intermédiaire. Nous vous conseillons de reparcourir ce module pour sécuriser vos acquis.</p>`;
      }
      resultHTML += `</div>`;
      
      document.getElementById('slide-content').innerHTML = current.contenu + resultHTML;
      document.getElementById('btn-next').disabled = false;
      return;
    }

    document.getElementById('btn-next').disabled = true;

    const qData = current.quiz_multi[currentQuizQuestionIndex];
    let quizHTML = `<div class="quiz-box" id="quiz-dynamic-box">`;
    quizHTML += `<p style="font-size: 0.9rem; color:#6B7280; font-weight:600; margin-bottom:5px;">Question ${currentQuizQuestionIndex + 1} sur ${qCount}</p>`;
    quizHTML += `<div class="quiz-q-title">${qData.question}</div>`;
    
    qData.options.forEach((option, idx) => {
      quizHTML += `<div class="quiz-option" onclick="processQuizAnswer(this, ${idx}, ${qData.correctIndex}, '${qData.feedback.replace(/'/g, "\\'")}')">${option}</div>`;
    });
    
    quizHTML += `<div id="quiz-feedback-box" class="quiz-feedback"></div></div>`;
    
    document.getElementById('slide-content').innerHTML = current.contenu + quizHTML;
  }

  function processQuizAnswer(element, selectedIdx, correctIdx, feedbackText) {
    const options = element.parentElement.querySelectorAll('.quiz-option');
    options.forEach(opt => opt.style.pointerEvents = 'none');

    const feedbackBox = document.getElementById('quiz-feedback-box');
    feedbackBox.style.display = "block";
    
    if (selectedIdx === correctIdx) {
      element.classList.add('correct');
      userScore++;
      feedbackBox.innerHTML = `<span style="color: #065F46; background:#D1FAE5; display:block; padding:8px; border-radius:4px;">🎉 ${feedbackText}</span>`;
    } else {
      element.classList.add('wrong');
      options[correctIdx].classList.add('correct');
      feedbackBox.innerHTML = `<span style="color: #991B1B; background:#FEE2E2; display:block; padding:8px; border-radius:4px;">❌ ${feedbackText}</span>`;
    }

    setTimeout(() => {
      currentQuizQuestionIndex++;
      displayQuizQuestion();
    }, 2500);
  }

  function navigate(direction) {
    currentIndex += direction;
    displaySlide();
  }

  window.onload = initLecteur;
</script>
</body>
</html>
